<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Plus Jakarta Sans','Inter',sans-serif;overflow:hidden;background:#fcf9f4;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{display:block}
#root,#root>div{height:100%}

@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes floatYSlow{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes pulsate{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.07)}}
@keyframes pinDrop{0%{transform:translateY(-16px);opacity:.3}70%{transform:translateY(2px);opacity:1}100%{transform:translateY(0);opacity:1}}
@keyframes bounceIn{0%{transform:scale(.5);opacity:.4}60%{transform:scale(1.08)}80%{transform:scale(.97)}100%{transform:scale(1);opacity:1}}
@keyframes waveBar{0%,100%{height:3px}50%{height:14px}}
@keyframes shimmer{0%,100%{opacity:.5}50%{opacity:1}}

.float{animation:floatY 3.6s ease-in-out infinite}
.float-slow{animation:floatYSlow 5s ease-in-out infinite}
.pulse{animation:pulsate 2.2s ease-in-out infinite}
.bounce{animation:bounceIn .65s cubic-bezier(.22,1,.36,1) both}
.pin{animation:pinDrop .55s cubic-bezier(.22,1,.36,1) both}
</style>

  const pct = (timeLeft%3600)/3600;
  const r=42, circ=2*Math.PI*r;
  return (
    <svg viewBox="0 0 340 290" fill="none" style={{width:'100%',height:'100%',display:'block'}}>
      <ellipse cx={170} cy={265} rx={108} ry={21} fill={C.orangeL} opacity=".75"/>

          style={{filter:'drop-shadow(0 8px 26px rgba(0,0,0,.1))'}}>
        </circle>
        <circle cx="170" cy="116" r={r} stroke={C.subtle} strokeWidth="8" fill="none"/>
        <circle cx="170" cy="116" r={r}
          stroke={C.orange} strokeWidth="8" fill="none"
          strokeLinecap="round"
          strokeDasharray={circ}
          strokeDashoffset={circ*(1-pct)}
          transform="rotate(-90 170 116)"

        {x:172,emoji:'🥭',name:'Mango Nasyonal',price:'150 G',barW:58,delay:'.75s',bg:C.orangeL,urgent:true},

          <text x={p.x} y={p.y-37} textAnchor="middle" fontSize="9" fill={p.color} fontWeight="700">{p.label}</text>
          <text x={p.x} y={p.y-25} textAnchor="middle" fontSize="7.5" fill={C.muted}>{p.sub}</text>
          <path d={`M${p.x-5},${p.y-16} L${p.x},${p.y-10} L${p.x+5},${p.y-16}`} fill="white"/>
          <path d={`M${p.x},${p.y+8} C${p.x-11},${p.y-2} ${p.x-11},${p.y-13} ${p.x},${p.y-15} C${p.x+11},${p.y-13} ${p.x+11},${p.y-2} ${p.x},${p.y+8}Z`}
            fill={p.color}/>
          <circle cx={p.x} cy={p.y-4} r="3.2" fill="white"/>
          <rect x={p.x+10} y={p.y-11} width="38" height="15" rx="7.5" fill={p.color} opacity=".92"/>
          <text x={p.x+29} y={p.y+0} textAnchor="middle" fontSize="7.5" fill="white" fontWeight="600">{p.dist}</text>
        </g>
      ))}

      {/* Compass */}
      <g className="float-slow" style={{transformOrigin:'290px 54px'}}>
        <circle cx="290" cy="54" r="18" fill="white" style={{filter:'drop-shadow(0 3px 10px rgba(0,0,0,.1))'}}>
        </circle>
        <path d="M290 40 L294 56 L290 54 L286 56 Z" fill={C.orange}/>
        <path d="M290 68 L286 52 L290 54 L294 52 Z" fill={C.muted} opacity=".45"/>
        <text x="290" y="41" textAnchor="middle" fontSize="6" fill={C.orange} fontWeight="700">N</text>
      </g>
    </svg>
  );
}

/* ══════════════════════════════
   SCREEN CONFIG
══════════════════════════════ */
const SCREENS = [
  {
    id:0, tag:'Peman Sikiri',
    title:'Eskwo ki\nProteje Ou',
    body:'Lajan an bloke jis livrezon fèt. Ou bay kòd OTP 6 chif nan pwen kolèk — epi sèlman lè sa a MonCash libere fon yo. Pa gen fwod, pa gen pèt.',
    cta:'Kontinye',
    bg:C.teal, dark:true,
    tagBg:'rgba(255,255,255,.18)', tagC:'white',
    titleC:'white', bodyC:'rgba(255,255,255,.76)',
    cardBg:'rgba(0,0,0,.2)', cardBorder:'rgba(255,255,255,.1)',

  },
  {

    title:'Chat ak Nòt\nVokal Reyèl',

    bg:C.cream, dark:false,

  {

    cta:'Kontinye',
    bg:'#1a2a2b', dark:true,
    tagBg:'rgba(0,125,135,.32)', tagC:'#6ee7ea',
    titleC:'white', bodyC:'rgba(255,255,255,.68)',

  },
  {
    id:3, tag:'Flash Deals',
    title:'Pwomosyon\nLimite Reyèl',

    cta:'Kontinye', hasTimer:true,

    cta:'Kòmanse', isLast:true,

    titleC:'white', bodyC:'rgba(255,255,255,.76)',

/* ══════════════════════════════
   MAIN APP — Native full-screen onboarding
══════════════════════════════ */
function App() {
  const [cur, setCur]      = useState(()=>{ try{return parseInt(localStorage.getItem('aym_ob')||'0');}catch{return 0;} });
  const [timeLeft,setTime] = useState(2387);
  const touchX             = useRef(null);

  useEffect(()=>{ try{localStorage.setItem('aym_ob',cur);}catch{} },[cur]);
  useEffect(()=>{ const t=setInterval(()=>setTime(v=>v>0?v-1:3600),1000); return()=>clearInterval(t); },[]);

  // Tell the parent window (index.html) that the first onboarding screen
  // has rendered, so it can swap the splash for us without a black/login
  // flash. Standalone (no parent) just no-ops.
  useEffect(()=>{
    if (window.parent && window.parent !== window) {
      try { window.parent.postMessage({type:'aym:onboarding-ready'}, '*'); } catch(_) {}
    }
  },[]);

  const goTo = useCallback(i=>{ if(i>=0&&i<SCREENS.length)setCur(i); },[]);

  const fmtTime = s => {
    const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  };

  const sc    = SCREENS[cur];
  const Illus = sc.Illus;

  // swipe
  const onTS = e=>{ touchX.current=e.touches[0].clientX; };
  const onTE = e=>{ if(touchX.current==null)return; const dx=e.changedTouches[0].clientX-touchX.current; if(dx<-50)goTo(cur+1); else if(dx>50)goTo(cur-1); touchX.current=null; };

  const onCtaClick = ()=>{
    if(!sc.isLast){ goTo(cur+1); return; }
    // Embedded in index.html → notify parent. Standalone → flag + navigate.
    if (window.parent && window.parent !== window) {
      window.parent.postMessage({type:'aym:onboarding-complete'}, '*');
    } else {
      try{ localStorage.setItem('aym_onboarded','1'); }catch{}
      try{ localStorage.removeItem('aym_ob'); }catch{}
      window.location.replace('index.html');
    }
  };

  return (
    <div
      onTouchStart={onTS} onTouchEnd={onTE}
      style={{
        width:'100%',
        height:'100dvh',
        minHeight:'100vh',
        background: sc.bg,
        transition:'background .55s cubic-bezier(.4,0,.2,1)',
        display:'flex',
        flexDirection:'column',
        position:'relative',
        overflow:'hidden',
        fontFamily:"'Plus Jakarta Sans','Inter',sans-serif",
        WebkitFontSmoothing:'antialiased',
      }}>

      {/* Skip */}
      {cur < SCREENS.length-1 && (
        <button onClick={()=>goTo(SCREENS.length-1)}
          style={{
            position:'absolute',
            top:'calc(env(safe-area-inset-top, 0px) + 18px)',
            right:18, zIndex:60,
            background: sc.dark?'rgba(255,255,255,.14)':'rgba(28,28,25,.07)',
            border:'none', borderRadius:22,
            padding:'8px 18px',
            fontSize:13, fontWeight:600,
            color: sc.dark?'rgba(255,255,255,.88)':C.muted,
            cursor:'pointer', fontFamily:'inherit',
            backdropFilter:'blur(8px)', WebkitBackdropFilter:'blur(8px)',
          }}>
          Sote
        </button>
      )}

      {/* Illustration — fills the upper region. SVG has a fixed viewBox
          and preserves aspect ratio on its own, so we just give it a
          flex cell that can shrink (minHeight:0) and clip nothing. */}
      <div style={{
        flex:'1 1 0',
        display:'flex', alignItems:'center', justifyContent:'center',
        padding:'calc(env(safe-area-inset-top, 0px) + 72px) 20px 8px',
        minHeight:0, overflow:'hidden',
      }}>
        <div style={{
          width:'100%', height:'100%',
          maxWidth:460,
          display:'flex', alignItems:'center', justifyContent:'center',
        }}>
          <Illus timeLeft={timeLeft} key={`illus-${cur}`}/>
        </div>
      </div>

      {/* Bottom card */}
      <div style={{
        flex:'0 0 auto',
        background: sc.cardBg,
        backdropFilter:'blur(28px)', WebkitBackdropFilter:'blur(28px)',
        borderRadius:'32px 32px 0 0',
        borderTop:`1px solid ${sc.cardBorder}`,
        padding:'26px 26px calc(env(safe-area-inset-bottom, 0px) + 30px)',
        transition:'background .55s, border-color .55s',
      }}>
        {/* Tag */}
        <div style={{display:'inline-flex',alignItems:'center',gap:6,
          background:sc.tagBg,borderRadius:20,padding:'5px 13px',marginBottom:14}}>
          <div style={{width:5,height:5,borderRadius:'50%',background:sc.tagC}}/>
          <span style={{fontSize:10,fontWeight:700,color:sc.tagC,
            letterSpacing:'.08em',textTransform:'uppercase',whiteSpace:'nowrap'}}>
            {sc.tag}
          </span>
        </div>

        {/* Title */}
        <h1 style={{
          fontFamily:"'Plus Jakarta Sans',sans-serif",
          fontSize:30, fontWeight:800, lineHeight:1.18,
          color:sc.titleC, marginBottom:11,
          whiteSpace:'pre-line', letterSpacing:'-.02em',
        }}>
          {sc.title}
        </h1>

        {/* Timer */}
        {sc.hasTimer && (
          <div style={{display:'inline-flex',alignItems:'center',gap:7,
            background:C.orangeL,borderRadius:12,padding:'7px 14px',marginBottom:10}}>
            <span style={{fontSize:12}}>⚡</span>
            <span style={{fontSize:17,fontWeight:800,color:C.orange,
              fontVariantNumeric:'tabular-nums',letterSpacing:'.04em'}}>
              {fmtTime(timeLeft)}
            </span>
          </div>
        )}

        {/* Body */}
        <p style={{
          fontFamily:"'Manrope','Inter',sans-serif",
          fontSize:14.5, lineHeight:1.65,
          color:sc.bodyC, marginBottom:22, fontWeight:400,
        }}>
          {sc.body}
        </p>

        {/* Dots + CTA */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',gap:7,alignItems:'center'}}>
            {SCREENS.map((_,i)=>(
              <button key={i} onClick={()=>goTo(i)} aria-label={`Ekran ${i+1}`} style={{
                width:i===cur?22:7, height:7, borderRadius:4,
                background:i===cur?(sc.dark?'white':C.teal):(sc.dark?'rgba(255,255,255,.28)':C.subtleD),
                border:'none', cursor:'pointer', padding:0,
                transition:'all .35s cubic-bezier(.4,0,.2,1)',
              }}/>
            ))}
          </div>

          <button
            onClick={onCtaClick}
            onMouseEnter={e=>e.currentTarget.style.transform='scale(1.04)'}
            onMouseLeave={e=>e.currentTarget.style.transform='scale(1)'}
            style={{
              display:'flex',alignItems:'center',gap:8,
              background:sc.dark?'white':C.teal,
              color:sc.dark?C.teal:'white',
              border:'none',borderRadius:50,
              padding:sc.isLast?'14px 26px':'13px 18px',
              fontSize:14,fontWeight:700,cursor:'pointer',fontFamily:'inherit',
              boxShadow:`0 10px 28px ${sc.dark?'rgba(0,0,0,.28)':'rgba(0,102,111,.42)'}`,
              transition:'transform .18s ease, box-shadow .25s ease',
            }}>
            {sc.cta}
            {!sc.isLast && (
              <div style={{width:28,height:28,borderRadius:'50%',
                background:sc.dark?C.teal:'rgba(255,255,255,.2)',
                display:'flex',alignItems:'center',justifyContent:'center'}}>
                <svg width="11" height="11" viewBox="0 0 11 11" fill="none">
                  <path d="M3.5 2l4 3.5-4 3.5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </div>
            )}
          </button>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
