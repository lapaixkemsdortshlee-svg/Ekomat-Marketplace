version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
    open-pull-requests-limit: 5
    labels: ['dependencies']
    groups:
      playwright:
        patterns:
          - '@playwright/*'
          - '@axe-core/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
    open-pull-requests-limit: 5
    labels: ['dependencies', 'github-actions']
