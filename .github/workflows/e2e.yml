name: E2E (deployed)

# Tès end-to-end otantifye kont app la deplwaye. Kouri sou demann
# (workflow_dispatch) paske yo bezwen idantifyan (GitHub Secrets):
#   AYM_E2E_URL, AYM_E2E_EMAIL, AYM_E2E_PASSWORD, AYM_BYPASS_TOKEN (opsyonèl)
# Si secrets yo absan, tès yo skip (yo pa echwe).

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Deployed URL to test (overrides the AYM_E2E_URL secret)'
        required: false

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm

      - name: Install npm deps
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          AYM_E2E_URL: ${{ github.event.inputs.url || secrets.AYM_E2E_URL }}
          AYM_E2E_EMAIL: ${{ secrets.AYM_E2E_EMAIL }}
          AYM_E2E_PASSWORD: ${{ secrets.AYM_E2E_PASSWORD }}
          AYM_BYPASS_TOKEN: ${{ secrets.AYM_BYPASS_TOKEN }}
        run: npx playwright test --config playwright.e2e.config.mjs

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-report
          path: playwright-report/
          retention-days: 7
